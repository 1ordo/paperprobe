# Local development overrides — auto-loaded by `docker compose up`
# Adds bind mounts for live code reloading
# NOT used on Coolify (Coolify only reads docker-compose.yml)
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads

  celery-worker:
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads

  frontend:
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
